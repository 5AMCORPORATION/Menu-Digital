<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control - Cocina</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Impact&family=SF+Pro+Display:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #000000;
            --surface-color: #1C1C1E;
            --accent-color: #FF4500;
            --text-main: #FFFFFF;
            --text-muted: #8E8E93;
            --border-color: #2C2C2E;
            --color-pendiente: #FF9500;
            --color-preparacion: #5AC8FA;
            --color-entregado: #34C759;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'SF Pro Display', -apple-system, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 20px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
            margin-bottom: 30px;
        }

        header h1 {
            font-family: 'Impact', sans-serif;
            font-size: 2rem;
            letter-spacing: 1px;
            color: var(--text-main);
        }

        .btn-reset {
            background-color: #FF3B30;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            font-size: 0.85rem;
        }

        /* Contenedor de Tres Columnas para Flujo de Trabajo */
        .board {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            align-items: flex-start;
        }

        .column {
            background-color: var(--surface-color);
            border-radius: 20px;
            padding: 20px;
            border: 1px solid var(--border-color);
            min-height: 600px;
        }

        .column-header {
            font-family: 'Impact', sans-serif;
            font-size: 1.3rem;
            text-transform: uppercase;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            letter-spacing: 0.5px;
        }

        .column-count {
            background-color: rgba(255,255,255,0.1);
            padding: 2px 10px;
            border-radius: 10px;
            font-size: 0.9rem;
            font-family: 'SF Pro Display', sans-serif;
        }

        /* Tarjetas de Pedidos Individuales */
        .ticket-card {
            background-color: #000000;
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 15px;
            border: 1px solid var(--border-color);
            position: relative;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .ticket-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 10px;
        }

        .ticket-id {
            font-weight: 700;
            color: var(--accent-color);
            font-size: 1.1rem;
        }

        .ticket-time {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        .tag-entrega {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 700;
            text-transform: uppercase;
            margin-bottom: 12px;
        }

        .tag-domicilio { background-color: rgba(255, 69, 0, 0.2); color: #FF4500; }
        .tag-local { background-color: rgba(255, 255, 255, 0.2); color: #FFFFFF; }

        .client-name {
            font-size: 1.05rem;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .ticket-address {
            font-size: 0.85rem;
            color: var(--text-muted);
            background-color: #121212;
            padding: 8px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid var(--accent-color);
        }

        /* Lista de Alimentos Internos */
        .items-list {
            list-style: none;
            border-top: 1px solid var(--border-color);
            border-bottom: 1px solid var(--border-color);
            padding: 10px 0;
            margin-bottom: 15px;
        }

        .item-line {
            font-size: 0.95rem;
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .item-line span {
            font-weight: bold;
            color: #FFFFFF;
        }

        .item-specs {
            font-size: 0.8rem;
            color: var(--text-muted);
            padding-left: 14px;
            display: block;
        }

        .ticket-total {
            text-align: right;
            font-weight: 700;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        /* Botones de control de flujo */
        .btn-action {
            width: 100%;
            border: none;
            padding: 12px;
            border-radius: 10px;
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-action:hover { opacity: 0.9; }
        .btn-next { background-color: var(--color-preparacion); color: #000; }
        .btn-done { background-color: var(--color-entregado); color: #000; }
        .btn-archive { background-color: var(--surface-color); color: var(--text-muted); border: 1px solid var(--border-color); }

    </style>
</head>
<body>

    <header>
        <div>
            <h1>Panel de Control de Cocina</h1>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Monitoreo de pedidos en tiempo real</p>
        </div>
        <button class="btn-reset" onclick="clearAllOrders()">Limpiar Sistema</button>
    </header>

    <main class="board">
        <!-- COLUMNA: ENTRANTE / PENDIENTE -->
        <div class="column">
            <div class="column-header" style="color: var(--color-pendiente);">
                <span>📥 Pendientes</span>
                <span class="column-count" id="count-pendiente">0</span>
            </div>
            <div id="col-pendiente"></div>
        </div>

        <!-- COLUMNA: EN PREPARACIÓN -->
        <div class="column">
            <div class="column-header" style="color: var(--color-preparacion);">
                <span>🍳 En Cocina</span>
                <span class="column-count" id="count-preparacion">0</span>
            </div>
            <div id="col-preparacion"></div>
        </div>

        <!-- COLUMNA: ENTREGADO / LISTO -->
        <div class="column">
            <div class="column-header" style="color: var(--color-entregado);">
                <span>✅ Listos / Salida</span>
                <span class="column-count" id="count-entregado">0</span>
            </div>
            <div id="col-entregado"></div>
        </div>
    </main>

    <script>
        // Cargar y Renderizar Órdenes al iniciar
        document.addEventListener('DOMContentLoaded', () => {
            renderBoard();
            // Escuchar cambios de almacenamiento en tiempo real si tienen dos pestañas abiertas
            window.addEventListener('storage', renderBoard);
        });

        function getOrders() {
            return JSON.parse(localStorage.getItem('pedidos_cocina')) || [];
        }

        function saveOrders(orders) {
            localStorage.setItem('pedidos_cocina', JSON.stringify(orders));
            renderBoard();
        }

        function updateStatus(orderId, newStatus) {
            let orders = getOrders();
            orders = orders.map(order => {
                if(order.id === orderId) {
                    order.estado = newStatus;
                }
                return order;
            });
            saveOrders(orders);
        }

        function archiveOrder(orderId) {
            let orders = getOrders();
            orders = orders.filter(order => order.id !== orderId);
            saveOrders(orders);
        }

        function clearAllOrders() {
            if(confirm('¿Estás seguro de que deseas borrar todos los registros de la pantalla?')) {
                localStorage.removeItem('pedidos_cocina');
                renderBoard();
            }
        }

        function renderBoard() {
            const orders = getOrders();
            
            const colPendiente = document.getElementById('col-pendiente');
            const colPreparacion = document.getElementById('col-preparacion');
            const colEntregado = document.getElementById('col-entregado');

            // Limpiar columnas
            colPendiente.innerHTML = '';
            colPreparacion.innerHTML = '';
            colEntregado.innerHTML = '';

            let cPendiente = 0, cPreparacion = 0, cEntregado = 0;

            orders.forEach(order => {
                const card = document.createElement('div');
                card.className = 'ticket-card';

                // Crear líneas de artículos
                let itemsHtml = '';
                order.articulos.forEach(item => {
                    itemsHtml += `
                        <li class="item-line">
                            <span>• ${item.name}</span>
                            <small class="item-specs">${item.specs}</small>
                        </li>
                    `;
                });

                // Sección condicional de dirección/notas
                let addressHtml = '';
                if(order.tipo === 'domicilio') {
                    addressHtml = `
                        <div class="ticket-address">
                            <strong>Dir:</strong> ${order.direccion}<br>
                            ${order.notas ? `<strong>Nota:</strong> ${order.notes || order.notas}` : ''}
                        </div>
                    `;
                }

                // Determinar botón de acción inferior según su estado
                let actionButton = '';
                if(order.estado === 'pendiente') {
                    actionButton = `<button class="btn-action btn-next" onclick="updateStatus(${order.id}, 'preparacion')">Empezar a cocinar 👨‍🍳</button>`;
                    cPendiente++;
                } else if(order.estado === 'preparacion') {
                    actionButton = `<button class="btn-action btn-done" onclick="updateStatus(${order.id}, 'entregado')">Terminado / Despachar ✔️</button>`;
                    cPreparacion++;
                } else if(order.estado === 'entregado') {
                    actionButton = `<button class="btn-action btn-archive" onclick="archiveOrder(${order.id})">Archivar Pedido 📁</button>`;
                    cEntregado++;
                }

                card.innerHTML = `
                    <div class="ticket-header">
                        <span class="ticket-id">#${order.id}</span>
                        <span class="ticket-time">${order.hora}</span>
                    </div>
                    <span class="tag-entrega ${order.tipo === 'domicilio' ? 'tag-domicilio' : 'tag-local'}">
                        ${order.tipo === 'domicilio' ? '🏍️ Domicilio' : '🏪 En Local'}
                    </span>
                    <div class="client-name">${order.cliente}</div>
                    ${addressHtml}
                    <ul class="items-list">
                        ${itemsHtml}
                    </ul>
                    <div class="ticket-total">Total: $${order.total}</div>
                    ${actionButton}
                `;

                // Inserción en la columna correspondiente
                if(order.estado === 'pendiente') colPendiente.appendChild(card);
                if(order.estado === 'preparacion') colPreparacion.appendChild(card);
                if(order.estado === 'entregado') colEntregado.appendChild(card);
            });

            // Actualizar contadores de cabecera
            document.getElementById('count-pendiente').innerText = cPendiente;
            document.getElementById('count-preparacion').innerText = cPreparacion;
            document.getElementById('count-entregado').innerText = cEntregado;
        }
    </script>
</body>
</html>
